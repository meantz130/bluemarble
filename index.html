<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meantz 한국 카토그램 마블 v1.01 </title>
    <style>
        :root {
            --primary-color: #007bff;
            --success-color: #28a745;
            --danger-color: #dc3545;
            --warning-color: #ffc107;
            --gold-color: #ffd700;
            --bg-color: #f4f6f9;
            --panel-bg: #ffffff;
            --info-color: #17a2b8;
        }

        body { font-family: 'Pretendard', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg-color); margin: 0; padding: 20px; display: flex; justify-content: center; height: 100vh; box-sizing: border-box; overflow: hidden; }
        #main-wrapper { display: flex; gap: 20px; width: 100%; max-width: 1600px; height: 100%; }
        
        #side-panel { flex: 0.7; min-width: 300px; display: flex; flex-direction: column; gap: 15px; height: 100%; }
        #main-content { flex: 3; display: flex; flex-direction: column; gap: 15px; height: 100%; overflow: hidden; }

        .panel-box { background: var(--panel-bg); padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); border: 1px solid #eee; display: flex; flex-direction: column; }
        h2 { margin: 0 0 5px 0; color: #333; font-size: 20px; text-align: center; }
        .subtitle { color: #666; font-size: 12px; text-align: center; margin-bottom: 15px; }
        
        .btn { width: 100%; padding: 12px; cursor: pointer; border: none; border-radius: 8px; font-weight: bold; font-size: 14px; transition: all 0.2s; }
        .btn-main { background: var(--primary-color); color: white; font-size: 16px; height: 60px; box-shadow: 0 4px 0 #0056b3; }
        .btn-main:active { transform: translateY(2px); box-shadow: 0 2px 0 #0056b3; }
        .btn-main:disabled { background: #ccc; cursor: not-allowed; box-shadow: none; }
        .btn-save { background: white; color: var(--success-color); border: 2px solid var(--success-color); }
        .btn-reset { background: white; color: var(--danger-color); border: 2px solid var(--danger-color); }
        .btn-info { background: white; color: var(--info-color); border: 2px solid var(--info-color); margin-top: 5px; }
        
        .result-display { text-align: center; font-size: 22px; font-weight: bold; margin: 10px 0; padding: 10px; background: #f8f9fa; border-radius: 8px; border: 1px inset #eee; }
        #status-msg { padding: 12px; border-radius: 8px; font-weight: bold; text-align: center; font-size: 14px; background: #fff; border: 1px solid #eee; min-height: 40px; display: flex; align-items: center; justify-content: center; }

        #modal-overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.7); display: none; justify-content: center; align-items: center; z-index: 9999;
            backdrop-filter: blur(4px);
        }
        #custom-alert { 
            background: white; padding: 30px; border-radius: 20px; width: 90%; max-width: 400px; 
            text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            animation: pop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes pop { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        
        #modal-title { font-size: 24px; font-weight: 800; margin-bottom: 10px; color: #333; }
        #modal-desc { font-size: 16px; color: #666; margin-bottom: 20px; line-height: 1.5; }
        .modal-btn { background: var(--primary-color); color: white; border: none; padding: 12px 30px; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 16px; width: 100%; }
        
        .modal-gold { border: 5px solid var(--gold-color) !important; }
        .modal-gold #modal-title { color: #b79500; }

        @keyframes current-pulse {
            0% { transform: scale(1); box-shadow: 0 0 0px rgba(0, 123, 255, 0.7); }
            50% { transform: scale(1.05); box-shadow: 0 0 15px rgba(0, 123, 255, 0.9); }
            100% { transform: scale(1); box-shadow: 0 0 0px rgba(0, 123, 255, 0.7); }
        }
        .gold-glow { animation: gold-pulse 1.5s infinite; border: 2px solid var(--gold-color) !important; }

        .log-section { flex: 1; overflow: hidden; }
        .log { flex-grow: 1; font-size: 12px; color: #555; overflow-y: auto; border-top: 1px solid #eee; padding-top: 10px; }
        .log-entry { margin-bottom: 5px; border-bottom: 1px solid #f9f9f9; }
        .log-time { color: #999; margin-right: 5px; }

        #map-container { 
            flex: 1; display: grid; grid-template-columns: repeat(20, 1fr); gap: 4px; 
            background: #e0e0e0; border: 2px solid #ccc; border-radius: 8px; padding: 10px; align-content: start;
            overflow-y: auto;
        }
        .cell { aspect-ratio: 1/1; background: white; border-radius: 4px; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; overflow: hidden; border: 1px solid #eee; transition: all 0.2s; }
        .cell-num { font-size: 10px; color: #ccc; }
        .cell-name { display: none; }
        .cell.has-name { background: #f8f9fa; border: 1px solid #ddd; }
        .cell.has-name .cell-num { font-size: 9px; color: #666; font-weight: bold; position: absolute; top: 2px; left: 3px; }
        .cell.has-name .cell-name { display: block; font-size: clamp(10px, 0.8vw, 14px); font-weight: 800; color: #333; line-height: 1.1; word-break: keep-all; margin-top: 5px; padding: 0 2px; }
        
        .cell.conquered { background: #d4edda !important; border-color: #c3e6cb !important; }
        .cell.conquered::after { content: "🚩"; position: absolute; font-size: 10px; top: 1px; right: 2px; }

        .cell.active { 
            background: #fff3cd !important; 
            z-index: 10; 
            border: 3px solid var(--primary-color) !important; 
            animation: current-pulse 1.5s infinite; 
        }
        .cell.active::after { content: "📍"; position: absolute; font-size: 12px; top: 1px; right: 2px; z-index: 11; }

        .cell.clickable { cursor: pointer; border: 1px solid #ffd700 !important; }
        .cell.clickable:hover { transform: scale(1.1); z-index: 10; background: #fffdf0 !important; }

        .rule-list { display: grid; grid-template-columns: repeat(2, 1fr); gap: 5px 20px; font-size: 13px; color: #444; }
        .rule-item { padding-left: 20px; position: relative; line-height: 1.4; }
        .rule-item::before { content: "•"; position: absolute; left: 5px; color: var(--primary-color); font-weight: bold; }
    </style>
</head>

<div id="modal-overlay">

    function checkGameEnd() {
        if (conqueredList.size >= TOTAL_CELLS) {
            showAlert("🏆 전국 제패 성공!", "축하합니다! 대한민국 250개 지역을 모두 정복하셨습니다. 당신은 진정한 여행왕입니다!", false);
            addLog("🎊 축하합니다! 모든 지역을 정복했습니다! 🎊", "#28a745");
            rollBtn.disabled = true;
            rollBtn.innerText = "🏆 탐험 완료";
            return true;
        }
        return false;
    }

    function rollMoveDice() {
        if (isSelectMode) return;
        
        const available = [];
        const conquered = Array.from(conqueredList);
        for (let i = 1; i <= TOTAL_CELLS; i++) {
            if (!conqueredList.has(i)) available.push(i);
        }

        if (available.length === 0) {
            checkGameEnd();
            return;
        }

        if (Math.random() < GOLD_KEY_CHANCE) {
            const key = GOLD_KEYS[Math.floor(Math.random() * GOLD_KEYS.length)];
            showAlert(`✨ 황금열쇠: ${key.name}`, key.desc, true);
            addLog(`🎁 황금열쇠: ${key.name}`, '#b79500');
            if (key.action === "retry") return;
            if (key.action === "select") { enableSelectMode(); return; }
            if (key.action === "stay") return;
        }

        let selectedNum;
        const isDuplicateRoll = Math.random() < DUPLICATE_RATE;

        if (isDuplicateRoll && conquered.length > 0) {
            selectedNum = conquered[Math.floor(Math.random() * conquered.length)];
            const name = REGION_NAMES[selectedNum] || "";
            document.getElementById('move-result').innerText = `중복 발생!`;
            showAlert("🚫 중복 지역", `${selectedNum}번 [${name}]은 이미 방문한 곳입니다. 아쉽지만 무효!`);
            addLog(`${selectedNum}번 이미 방문함`, '#dc3545');
            statusMsg.innerText = `🚫 중복: ${selectedNum}번 [${name}]`;
        } else {
            selectedNum = available[Math.floor(Math.random() * available.length)];
            document.getElementById('move-result').innerText = `🎲 결과: ${selectedNum}`;
            moveTo(selectedNum);
        }
    }

    const mapContainer = document.getElementById('map-container');
    const logBox = document.getElementById('log-box');
    const statusMsg = document.getElementById('status-msg');
    const rollBtn = document.getElementById('roll-btn');
    const modalOverlay = document.getElementById('modal-overlay');
    const modalTitle = document.getElementById('modal-title');
    const modalDesc = document.getElementById('modal-desc');
    const customAlert = document.getElementById('custom-alert');

    function showAlert(title, desc, isGold = false) {
        modalTitle.innerText = title;
        modalDesc.innerText = desc;
        if(isGold) customAlert.classList.add('modal-gold');
        else customAlert.classList.remove('modal-gold');
        modalOverlay.style.display = 'flex';
    }

    function closeModal() { modalOverlay.style.display = 'none'; }

    function createMap() {
        mapContainer.innerHTML = '';
        for (let i = 1; i <= TOTAL_CELLS; i++) {
            const cell = document.createElement('div');
            cell.className = 'cell';
            if (REGION_NAMES[i]) cell.classList.add('has-name');
            cell.id = `cell-${i}`;
            cell.onclick = () => handleCellClick(i);
            cell.innerHTML = `<span class="cell-num">${i}</span><span class="cell-name">${REGION_NAMES[i] || ""}</span>`;
            mapContainer.appendChild(cell);
        }
    }

    function moveTo(num) {
        if (currentPos) document.getElementById(`cell-${currentPos}`)?.classList.remove('active');
        currentPos = num;
        const targetCell = document.getElementById(`cell-${num}`);
        if (targetCell) {
            targetCell.classList.add('active', 'conquered');
            conqueredList.add(num);
            addLog(`${num}번 [${REGION_NAMES[num]}] 정복!`);
            updateStatusText();
            saveGame();
            checkGameEnd(); // 정복 후 엔딩 체크
        }
    }

    function handleCellClick(num) {
        if (!isSelectMode) return;
        if (conqueredList.has(num)) { showAlert("알림", "이미 정복한 지역입니다."); return; }
        if (currentPos) document.getElementById(`cell-${currentPos}`)?.classList.remove('active');
        currentPos = num;
        conqueredList.add(num);
        document.getElementById(`cell-${num}`).classList.add('conquered', 'active');
        addLog(`✨ 황금열쇠(지정): ${num}번 [${REGION_NAMES[num]}]`, '#b79500');
        disableSelectMode();
        updateStatusText();
        saveGame();
        checkGameEnd(); // 수동 선택 후에도 엔딩 체크
    }

    function enableSelectMode() {
        isSelectMode = true;
        mapContainer.classList.add('gold-glow');
        rollBtn.disabled = true;
        statusMsg.innerText = "🎫 원하는 지역을 선택하세요!";
        document.querySelectorAll('.cell').forEach(c => c.classList.add('clickable'));
    }

    function disableSelectMode() {
        isSelectMode = false;
        mapContainer.classList.remove('gold-glow');
        rollBtn.disabled = false;
        document.querySelectorAll('.cell').forEach(c => c.classList.remove('clickable'));
    }

    function updateStatusText() {
        const name = REGION_NAMES[currentPos] ? ` [${REGION_NAMES[currentPos]}]` : "";
        statusMsg.innerText = `📍 현재: ${currentPos || '시작전'}번${name} (${conqueredList.size}/${TOTAL_CELLS})`;
        statusMsg.style.color = 'var(--primary-color)';
    }

    function addLog(msg, color = '') {
        const time = new Date().toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
        const logEntry = document.createElement('div');
        logEntry.className = 'log-entry';
        if(color) logEntry.style.color = color;
        logEntry.innerHTML = `<span class="log-time">[${time}]</span>${msg}`;
        logBox.insertBefore(logEntry, logBox.firstChild);
    }

    const SAVE_KEY = 'korea_marble_v2_final';
    function saveGame() {
        localStorage.setItem(SAVE_KEY, JSON.stringify({ conquered: Array.from(conqueredList), lastPos: currentPos }));
    }

    function loadGame() {
        const saved = localStorage.getItem(SAVE_KEY);
        if (saved) {
            const data = JSON.parse(saved);
            conqueredList = new Set(data.conquered);
            currentPos = data.lastPos;
            conqueredList.forEach(num => document.getElementById(`cell-${num}`)?.classList.add('conquered'));
            if (currentPos) { document.getElementById(`cell-${currentPos}`)?.classList.add('active'); updateStatusText(); }
            checkGameEnd(); // 로드 시에도 엔딩 여부 확인
        }
    }

    function resetGame() {
        if (confirm("정말로 모든 여행 기록을 초기화하시겠습니까?")) {
            localStorage.removeItem(SAVE_KEY);
            location.reload();
        }
    }

    createMap();
    loadGame();
    document.getElementById('rule-list').innerHTML = [
        "대한민국에 있는 지역을 돌아다니는 게임입니다.",
        "주사위를 굴려 나온 숫자의 지역으로 이동합니다.",
        "모든 지역(250개)을 정복하는 것이 목표입니다.",
        "지역에 걸렸을 시 무조건 다녀와야 합니다.",
        "이미 방문한 지역은 무효 처리됩니다.",
        "10% 확률로 황금열쇠가 발동합니다.",
        "황금열쇠 지시 이행 후 다음 주사위를 돌립니다.",
        "황금열쇠 발동 시 특수 규칙이 적용됩니다.",
        "당일 여행 황금열쇠 후 섬지역에 걸렸다면 당일여행 황금열쇠는 무효로 처리합니다.",
        "기상 악화 등 변수 발생 시 다음 기회로 미룰 수 있습니다.",
        "중복하여 걸리는 확률을 85%로 조정하여 과다한 지역 중복을 완화."
    ].map(r => `<div class="rule-item">${r}</div>`).join('');
</script>
</body>
</html>
